id = "titles"
name = "Agent Titles"
version = "0.1.0"
description = "Report each agent pane's live task title to the sidebar as $task, and name its tab (Claude + Codex)"
min_herdr_version = "0.7.4"   # pane metadata reporting + custom sidebar $tokens land in 0.7.4
platforms = ["macos"]

# The plugin [[events]] hook surface carries no title-change event (agent_status_changed
# only flips on idle<->working), but the socket API's events.subscribe does: pane.updated
# fires on every terminal-title change, and /rename emits an OSC title so it shows there
# too. So a small push daemon (titles.py watch) holds that subscription and does the work;
# these hooks just `ensure` it is running. ensure is idempotent (pidfile-guarded) and
# near-instant, so firing it on several events is harmless. Between them they bring the
# daemon up on a fresh agent, a status change, and a new pane — covering startup, session
# restore, and newly spawned agents.

[[events]]
on = "pane.agent_status_changed"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/titles.py\" ensure"]

[[events]]
on = "pane.agent_detected"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/titles.py\" ensure"]

[[events]]
on = "pane.created"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/titles.py\" ensure"]

# Force an immediate full refresh of every agent pane's $task and tab name. Bind to a
# key for a manual kick; the daemon already keeps things current within ~3s.
[[actions]]
id = "refresh"
title = "Sidebar titles: refresh all"
contexts = ["workspace"]
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/titles.py\" report-all"]
