id = "recent-agent"
name = "Recent Agent"
version = "0.1.0"
description = "Focus the most recently completed agent (idle/done/blocked)"
min_herdr_version = "0.7.1"
platforms = ["macos"]

# Track completions event-driven: herdr fires pane.agent_status_changed on every
# agent status transition and runs this command with HERDR_PLUGIN_EVENT_JSON set.
# recent.py record appends the pane to a log when it enters idle/done/blocked.
# Wrapped in a login shell so the mise-managed python3 is on PATH.
[[events]]
on = "pane.agent_status_changed"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/recent.py\" record"]

# Focus the most-recent still-waiting agent. Bound in the user herdr.toml as:
#   key = "prefix+ctrl+l"; type = "plugin_action"; command = "recent-agent.focus"
# recent.py focus reads the log newest-first and `herdr agent focus`es the first
# agent still in an attention state (skipping any that resumed working).
[[actions]]
id = "focus"
title = "Focus most recent completed agent"
contexts = ["workspace"]
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/recent.py\" focus"]
