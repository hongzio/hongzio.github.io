<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <!-- interactive-widget=resizes-content: on Chromium the virtual keyboard
       shrinks the layout viewport so #term (inset:0) follows automatically.
       iOS Safari ignores this; the visualViewport handler below covers it. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
  <title>herdr</title>
  <link rel="stylesheet" href="/static/xterm.css" />
  <style>
    /* overscroll-behavior: none kills mobile pull-to-refresh and the overscroll
       bounce; overflow: hidden stops the page itself from scrolling. */
    html, body { margin: 0; height: 100%; background: #000; overscroll-behavior: none; overflow: hidden; }
    #term { position: absolute; inset: 0; }
    /* Terminal text is always natively selectable: long-press to select, then copy
       via the OS menu to the device clipboard. xterm.css sets user-select:none (it
       renders its own mouse selection); override it so the browser's native
       selection/copy works on mobile. */
    .xterm, .xterm .xterm-screen, .xterm .xterm-rows, .xterm .xterm-rows * {
      user-select: text; -webkit-user-select: text; -ms-user-select: text;
    }
    /* Mobile control bar. Hidden by default; JS shows it (display:flex) only on
       touch devices and positions it against the visual viewport so it rides above
       the keyboard. Buttons must not steal focus (that closes the keyboard) —
       handlers preventDefault, and user-select:none avoids selecting on tap. */
    #bar { display: none; position: absolute; left: 0; right: 0; height: 88px;
           box-sizing: border-box; background: #111; border-top: 1px solid #333;
           z-index: 10; flex-direction: column;
           user-select: none; -webkit-user-select: none; }
    #bar .row { display: flex; flex: 1 1 0; align-items: stretch; }
    #bar button {
      flex: 1 1 0; min-width: 0; margin: 4px; border: 1px solid #444;
      border-radius: 6px; background: #222; color: #ddd;
      font: 600 14px/1 ui-monospace, Menlo, monospace; -webkit-appearance: none;
      touch-action: manipulation;
    }
    #bar .row + .row button { margin-top: 0; }  /* rows share the gap between them */
    #bar button:active { background: #333; }
    #bar button.active { background: #2b6; color: #041; border-color: #2b6; }
  </style>
</head>
<body>
  <div id="term"></div>
  <div id="bar">
    <div class="row">
      <button data-act="esc">esc</button>
      <button data-act="tab">tab</button>
      <button data-act="ctrl">Ctrl</button>
      <button data-act="shift">Shift</button>
      <button data-act="prefix">prefix</button>
    </div>
    <div class="row">
      <button data-act="left">←</button>
      <button data-act="up">↑</button>
      <button data-act="down">↓</button>
      <button data-act="right">→</button>
      <button data-act="pageup">PgUp</button>
      <button data-act="pagedown">PgDn</button>
      <button data-act="kbd">⌨</button>
    </div>
  </div>
  <script src="/static/xterm.js"></script>
  <script src="/static/addon-fit.js"></script>
  <script>
    var term = new Terminal({ cursorBlink: true, fontSize: 14 });
    var fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById("term"));
    fit.fit();

    var proto = location.protocol === "https:" ? "wss" : "ws";
    // sock is (re)assigned by connect(); sendResize/sendBytes read it live.
    var sock = null;
    var reconnectTimer = null;
    var backoff = 0;  // grows per failed retry (onclose); reset on a successful open

    function sendResize() {
      if (!sock || sock.readyState !== WebSocket.OPEN) return;
      sock.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
    }

    // Open the WebSocket and wire its handlers. Mobile browsers freeze a
    // backgrounded page and the OS closes its sockets, so switching away and back
    // lands on a dead socket that never came back — the old client just showed
    // "[connection closed]" and needed a manual reload. connect() is idempotent
    // (a no-op while CONNECTING/OPEN) so the reconnect triggers below can call it
    // freely. herdr is a multiplexer: a fresh attach reattaches to the same
    // session and redraws the screen, so reconnecting is seamless.
    function connect() {
      if (sock && (sock.readyState === WebSocket.CONNECTING ||
                   sock.readyState === WebSocket.OPEN)) return;
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      sock = new WebSocket(proto + "://" + location.host + "/ws");
      sock.binaryType = "arraybuffer";
      sock.onopen = function () { backoff = 0; fit.fit(); sendResize(); term.focus(); };
      sock.onmessage = function (ev) { term.write(new Uint8Array(ev.data)); };
      sock.onclose = function () {
        // auto-reconnect with capped exponential backoff. The triggers below fire
        // connect() immediately (clearing this timer) when the user returns, so
        // this mainly covers background retries during a transient outage.
        backoff = Math.min(backoff ? backoff * 2 : 1000, 5000);
        reconnectTimer = setTimeout(connect, backoff);
      };
      sock.onerror = function () { try { sock.close(); } catch (e) {} };
    }

    // Reconnect the moment the user comes back or the network returns. connect()'s
    // guard makes these no-ops when the socket is already healthy, so firing on
    // several overlapping signals (any one of which a given browser may skip) is safe.
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") connect();
    });
    window.addEventListener("online", connect);
    window.addEventListener("focus", connect);
    window.addEventListener("pageshow", connect);

    connect();

    // keystrokes -> server (utf-8 bytes, binary frame)
    var enc = new TextEncoder();
    function sendBytes(data) {
      if (sock.readyState === WebSocket.OPEN) sock.send(enc.encode(data));
    }
    // ctrlMode (toggled by the mobile Ctrl button) rewrites the next typed
    // characters into control codes: 'a' -> Ctrl+A (0x01), 'c' -> Ctrl+C, etc.
    // It stays on (sticky lock) until the button is tapped again.
    var ctrlMode = false;
    function toCtrl(data) {
      if (!ctrlMode || data.length !== 1) return data;
      var c = data.charCodeAt(0);
      if (c >= 97 && c <= 122) c -= 96;       // a-z -> 0x01..0x1a
      else if (c >= 64 && c <= 95) c -= 64;   // @A-Z[\]^_ -> 0x00..0x1f
      else if (c === 32) c = 0;               // space -> NUL
      else return data;                       // no control code for this key
      return String.fromCharCode(c);
    }
    // shiftMode (mobile Shift button): the soft keyboard has its own shift, so this
    // only uppercases typed letters (layout-dependent symbols are left alone) and,
    // combined with the Tab button, sends Shift+Tab. Sticky like Ctrl. Ctrl takes
    // precedence — Ctrl+Shift+letter is the same control code as Ctrl+letter.
    var shiftMode = false;
    function toShift(data) {
      if (!shiftMode || data.length !== 1) return data;
      var c = data.charCodeAt(0);
      if (c >= 97 && c <= 122) return String.fromCharCode(c - 32); // a-z -> A-Z
      return data;
    }
    term.onData(function (data) { sendBytes(toShift(toCtrl(data))); });

    // Escape: browsers act on it specially (blur/cancel) and can swallow it
    // before xterm forwards it. Intercept at the capture phase, send ESC to the
    // pty ourselves, and stop both the browser default and xterm double-handling.
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        e.preventDefault();
        e.stopImmediatePropagation();
        sendBytes("\x1b");
        term.focus();
      }
    }, true);

    // Mobile keyboards (esp. iOS Safari) shrink the *visual* viewport without
    // touching the layout viewport, so #term's inset:0 stays full-height and the
    // bottom rows (prompt/cursor) hide behind the keyboard. Size #term to the
    // visual viewport instead, and refit so xterm reports the smaller row count to
    // the pty. rAF coalesces the burst of events during the keyboard open/close
    // animation into one refit per frame. The control bar (touch devices only)
    // reserves BAR_H at the bottom so terminal rows clear both bar and keyboard.
    var bar = document.getElementById("bar");
    var isTouch = window.matchMedia("(pointer: coarse)").matches;
    var BAR_H = isTouch ? 88 : 0;  // two rows: keys + kbd/scroll
    if (isTouch) bar.style.display = "flex";

    // Keyboard control. xterm focuses its hidden textarea on every tap of the
    // terminal, which on mobile pops the soft keyboard even when the tap was just
    // to click into herdr's UI (switch agents, focus a pane). Default the textarea
    // to inputmode=none so taps still focus + forward the mouse event to herdr but
    // the keyboard stays down; the ⌨ button raises it on demand, and prefix/Ctrl
    // raise it too (a keyboard key follows). Only on touch — desktop uses hardware.
    var ta = term.textarea || document.querySelector(".xterm-helper-textarea");
    var kbdOn = false;
    if (isTouch && ta) ta.inputMode = "none";
    function setKbd(on) {
      if (on === kbdOn) { if (on && ta) ta.focus(); return; }
      kbdOn = on;
      if (ta) ta.inputMode = on ? "text" : "none";
      var kb = bar.querySelector('[data-act="kbd"]');
      if (kb) kb.classList.toggle("active", on);
      if (!ta) return;
      // re-focus so the browser re-reads inputmode and (un)shows the soft keyboard
      if (on) { ta.blur(); ta.focus(); } else { ta.blur(); }
    }

    // herdr's prefix key, injected by serve.py from herdr's config ([keys] prefix,
    // default ctrl+b). Empty when the spec can't be represented as bytes (e.g. a
    // function key) — hide the button so it never sends the wrong thing.
    var PREFIX = "__HERDR_PREFIX__";
    if (!PREFIX) {
      var pbtn = bar.querySelector('[data-act="prefix"]');
      if (pbtn) pbtn.style.display = "none";
    }

    var refitQueued = false;
    function refit() {
      if (refitQueued) return;
      refitQueued = true;
      requestAnimationFrame(function () {
        refitQueued = false;
        var vv = window.visualViewport;
        var el = document.getElementById("term");
        if (vv) {
          el.style.top = vv.offsetTop + "px";
          el.style.height = (vv.height - BAR_H) + "px";
          el.style.bottom = "auto";
          if (isTouch) bar.style.top = (vv.offsetTop + vv.height - BAR_H) + "px";
        }
        fit.fit();
        sendResize();
      });
    }

    window.addEventListener("resize", refit);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", refit);
      window.visualViewport.addEventListener("scroll", refit);
    }
    refit(); // initial sizing + bar placement (bar has no CSS top otherwise)

    // Control-bar actions. Handlers fire on touchstart (preventDefault stops the
    // button from stealing focus, preserving the terminal's focus/keyboard state)
    // and on click for non-touch testing; touchstart's preventDefault suppresses
    // the synthesized click, so touch taps never double-fire. PgUp/PgDn send the
    // page keys to herdr, which scrolls its scrollback (there's no swipe-scroll
    // gesture — that would fight the native long-press text selection).
    function setCtrl(on) {
      ctrlMode = on;
      bar.querySelector('[data-act="ctrl"]').classList.toggle("active", on);
    }
    function setShift(on) {
      shiftMode = on;
      bar.querySelector('[data-act="shift"]').classList.toggle("active", on);
    }
    function doAction(act) {
      // esc/tab/PgUp/PgDn send a key without needing a follow-up, and the ⌨/Shift
      // toggles manage their own state — none of them should force the keyboard, so
      // they return before the setKbd(true) below (leaving the keyboard state as-is).
      if (act === "esc") { sendBytes("\x1b"); return; }
      if (act === "tab") { sendBytes(shiftMode ? "\x1b[Z" : "\t"); return; } // Shift+Tab = CSI Z
      if (act === "pageup") { sendBytes("\x1b[5~"); return; }
      if (act === "pagedown") { sendBytes("\x1b[6~"); return; }
      if (act === "up") { sendBytes("\x1b[A"); return; }
      if (act === "down") { sendBytes("\x1b[B"); return; }
      if (act === "right") { sendBytes("\x1b[C"); return; }
      if (act === "left") { sendBytes("\x1b[D"); return; }
      if (act === "kbd") { setKbd(!kbdOn); return; }
      if (act === "shift") { setShift(!shiftMode); return; }
      // prefix/Ctrl: raise the keyboard, since the user types a follow-up key next.
      if (act === "prefix") sendBytes(PREFIX);          // herdr prefix (from config)
      else if (act === "ctrl") setCtrl(!ctrlMode);
      setKbd(true);
    }
    function onBar(e) {
      var btn = e.target.closest("button");
      if (!btn) return;
      e.preventDefault(); // don't let the button take focus (keyboard would close)
      doAction(btn.dataset.act);
    }
    bar.addEventListener("touchstart", onBar, { passive: false });
    bar.addEventListener("click", onBar);
  </script>
</body>
</html>
