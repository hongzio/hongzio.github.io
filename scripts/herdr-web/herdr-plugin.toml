id = "web"
name = "Web Terminal"
version = "0.1.0"
description = "Expose the herdr session as a browser web terminal (optional cloudflared tunnel)"
min_herdr_version = "0.7.1"
platforms = ["macos"]

# Auto-start the daemon. serve.py ensure is idempotent (pidfile liveness check), so
# repeated fires are near-instant no-ops. herdr has no "server started" event and does
# NOT fire pane.created / tab.focused for a session RESTORED on startup — the only
# event that reliably fires on restore is pane.agent_status_changed (restored agents
# report status). So we subscribe to all three: agent-status covers the restart/restore
# case, pane.created covers new panes, tab.focused covers navigation in an agent-less
# session. Whichever fires first brings the daemon up.
[[events]]
on = "pane.agent_status_changed"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/serve.py\" ensure"]

[[events]]
on = "pane.created"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/serve.py\" ensure"]

[[events]]
on = "tab.focused"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/serve.py\" ensure"]

# connection panel: curses overlay showing the URLs (read-only) and live-editable
# username/password. Edits apply to new connections immediately (dynamic auth).
[[panes]]
id = "panel"
title = "Web Terminal"
placement = "overlay"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/panel.py\" ui"]

[[actions]]
id = "panel"
title = "Web terminal: connection panel"
contexts = ["workspace"]
command = ["sh", "-lc", "exec \"$HERDR_BIN_PATH\" plugin pane open --plugin web --entrypoint panel --placement overlay --focus"]

[[actions]]
id = "status"
title = "Web terminal: show URL / credentials"
contexts = ["workspace"]
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/serve.py\" status"]

[[actions]]
id = "stop"
title = "Web terminal: stop server"
contexts = ["workspace"]
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/serve.py\" stop"]

[[actions]]
id = "restart"
title = "Web terminal: restart server"
contexts = ["workspace"]
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/serve.py\" restart"]
