id = "favorites"
name = "Favorites"
version = "0.1.0"
description = "Pin herdr tabs to ctrl+1..9 slots from an overlay"
min_herdr_version = "0.7.1"
platforms = ["macos"]

# The overlay: a curses grid of 9 slots. The tab focused when the overlay opens
# is passed in via the FAV_ACTIVE_TAB env var (see the `open` action below);
# the overlay can't tell which tab was active once it grabs focus. Runs wrapped
# in a login shell so the mise-managed python3 is on PATH.
[[panes]]
id = "picker"
title = "Favorites"
placement = "overlay"
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/picker.py\" ui"]

# Open the overlay. Bound in the user herdr.toml as:
#   key = "prefix+ctrl+f"; type = "plugin_action"; command = "favorites.open"
# plugin_action commands receive HERDR_TAB_ID = the tab focused at trigger time,
# so we forward it into the overlay as FAV_ACTIVE_TAB (the overlay itself sees
# only its own pane's context, not the tab the user came from).
[[actions]]
id = "open"
title = "Favorites"
contexts = ["workspace"]
command = ["sh", "-lc", "exec \"$HERDR_BIN_PATH\" plugin pane open --plugin favorites --entrypoint picker --placement overlay --focus --env FAV_ACTIVE_TAB=\"$HERDR_TAB_ID\""]

# Focus a pinned tab. Bound in the user herdr.toml as:
#   key = "ctrl+N"; type = "plugin_action"; command = "favorites.focus-N"
# Each reads ~/.config/herdr/favorites.toml and `herdr tab focus`es slot N
# (no-op if the slot is empty or the tab is gone).

[[actions]]
id = "focus-1"
title = "Focus favorite 1"
contexts = ["workspace"]
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/picker.py\" focus 1"]

[[actions]]
id = "focus-2"
title = "Focus favorite 2"
contexts = ["workspace"]
command = ["sh", "-lc", "exec python3 \"$HERDR_PLUGIN_ROOT/picker.py\" focus 2"]

