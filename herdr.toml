onboarding = false
[ui]
# mouse on
mouse_capture = true

# session persistence (built-in, no plugin needed unlike tmux-resurrect)
show_agent_labels_on_pane_borders = true
[session]
# restart supported agent panes (Claude Code, Codex, etc.) in their native sessions
resume_agents_on_restore = true

[experimental]
# also save pane terminal contents/scrollback across restarts
# (off by default for security: pane output can contain secrets/tokens)
pane_history = true

[keys]
prefix = "ctrl+a"

# window (tmux window -> herdr tab)
new_tab = "prefix+ctrl+c"       # new-window (C-c)
next_tab = "prefix+ctrl+l"      # next-window (vim l = right)
previous_tab = "prefix+ctrl+h"  # previous-window (vim h = left)
rename_tab = "prefix+ctrl+,"    # rename-window (C-,)
switch_tab = "prefix+ctrl+1..9" # select-window -t N (avoids clash w/ focus_agent on prefix+1..9)

# session (tmux session -> herdr workspace)
new_workspace = "prefix+shift+c"       # new-session (C)
close_workspace = "prefix+shift+x"     # kill-session (X)
next_workspace = "prefix+ctrl+n"       # next space (C-n)
previous_workspace = "prefix+ctrl+p"   # previous space (C-p)
rename_workspace = "prefix+$"          # rename-session ($)
workspace_picker = "prefix+ctrl+w"     # choose-tree (C-w)

# pane
close_pane = "prefix+ctrl+x"  # kill-pane (C-x)
zoom = "prefix+ctrl+z"        # resize-pane -Z (C-z)

## split (herdr names splits by their divider glyph, not tmux's -h/-v)
split_vertical = "prefix+|"        # left/right (right), a vertical | divider
split_horizontal = "prefix+minus"  # top/bottom (down), a horizontal - divider

## select
focus_pane_left = "prefix+ctrl+left"    # select-pane -L (C-Left)
focus_pane_down = "prefix+ctrl+down"    # select-pane -D (C-Down)
focus_pane_up = "prefix+ctrl+up"        # select-pane -U (C-Up)
focus_pane_right = "prefix+ctrl+right"  # select-pane -R (C-Right)

# agent navigation
next_agent = "prefix+ctrl+j"      # cycle to next sidebar agent
previous_agent = "prefix+ctrl+k"  # cycle to previous sidebar agent
focus_agent = "prefix+1..9"       # jump to Nth agent (plain nums; Option+num is unreliable on macOS)
goto = "prefix+ctrl+g"            # session navigator w/ agent-state filters

# misc
copy_mode = "prefix+ctrl+["  # copy-mode (C-[)
detach = "prefix+ctrl+d"     # detach-client (C-d)

# custom commands
## spawn a new claude agent in a new pane (auto-detected by herdr)
[[keys.command]]
key = "prefix+a"
type = "pane"
command = "claude"
description = "new claude agent"

# favorites (favorites plugin): open the overlay to pin the current tab to a slot.
# The action forwards HERDR_TAB_ID (focused tab at trigger time) to the overlay;
# the overlay can't tell which tab was active once it grabs focus. ctrl+1..9
# below focus the pinned tabs.
[[keys.command]]
key = "prefix+ctrl+f"
type = "plugin_action"
command = "nav.fav-open"
description = "favorites"

[[keys.command]]
key = "ctrl+1"
type = "plugin_action"
command = "nav.fav-1"
description = "focus favorite 1"

[[keys.command]]
key = "ctrl+2"
type = "plugin_action"
command = "nav.fav-2"
description = "focus favorite 2"

[[keys.command]]
key = "ctrl+3"
type = "plugin_action"
command = "nav.fav-3"
description = "focus favorite 3"

[[keys.command]]
key = "ctrl+4"
type = "plugin_action"
command = "nav.fav-4"
description = "focus favorite 4"

[[keys.command]]
key = "ctrl+5"
type = "plugin_action"
command = "nav.fav-5"
description = "focus favorite 5"

[[keys.command]]
key = "ctrl+6"
type = "plugin_action"
command = "nav.fav-6"
description = "focus favorite 6"

[[keys.command]]
key = "ctrl+7"
type = "plugin_action"
command = "nav.fav-7"
description = "focus favorite 7"

[[keys.command]]
key = "ctrl+8"
type = "plugin_action"
command = "nav.fav-8"
description = "focus favorite 8"

[[keys.command]]
key = "ctrl+9"
type = "plugin_action"
command = "nav.fav-9"
description = "focus favorite 9"

# conversations picker (conv-picker plugin) — opens the overlay.
# mode = which action you bind: .open (auto) | .open-fzf | .open-native
[[keys.command]]
key = "prefix+c"
type = "plugin_action"
command = "nav.conv-open"
description = "conversations picker"

# attention plugin: focus the most recently completed agent (one that entered
# idle/done/blocked and is still waiting). The plugin tracks completions via the
# pane.agent_status_changed event; this action jumps to the newest still-waiting.
[[keys.command]]
key = "prefix+ctrl+r"
type = "plugin_action"
command = "nav.attention-focus"
description = "focus most recent completed agent"

# tab-history plugin: browser-style back/forward over recently focused tabs.
# The plugin records every tab.focused event into a history list + cursor;
# back/forward step the cursor (skipping closed tabs) and focus that tab.
# o = older, i = newer (vim jumplist mnemonic). Moving does not record.
[[keys.command]]
key = "prefix+ctrl+o"
type = "plugin_action"
command = "nav.tab-back"
description = "tab history: back"

[[keys.command]]
key = "prefix+ctrl+i"
type = "plugin_action"
command = "nav.tab-forward"
description = "tab history: forward"

[theme]
name = "terminal"
auto_switch = false

[ui.toast]
delivery = "herdr"
